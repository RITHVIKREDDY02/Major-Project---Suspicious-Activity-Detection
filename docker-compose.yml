services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sarpass}
      POSTGRES_DB: ${POSTGRES_DB:-sardb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sar} -d ${POSTGRES_DB:-sardb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-sar}:${POSTGRES_PASSWORD:-sarpass}@db:5432/${POSTGRES_DB:-sardb}
      SESSION_SECRET: ${SESSION_SECRET}
    expose:
      - "3000"

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
